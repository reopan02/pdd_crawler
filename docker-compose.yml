services:
  # ── Chrome containers (one per shop) ──────────────────
  chrome-shop1:
    build: ./docker/chrome
    container_name: pdd-chrome-shop1
    volumes:
      - chrome-shop1-data:/home/chrome/chrome-data
    ports:
      - "9222:9223"   # CDP proxy (socat -> Chrome 127.0.0.1:9222)
      - "6080:6080"   # noVNC web client
    restart: unless-stopped
    shm_size: "2gb"
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9223/json/version >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 40s

  # Uncomment for additional shops:
  # chrome-shop2:
  #   build: ./docker/chrome
  #   container_name: pdd-chrome-shop2
  #   volumes:
  #     - chrome-shop2-data:/home/chrome/chrome-data
  #   ports:
  #     - "9223:9222"
  #     - "6081:6080"
  #   restart: unless-stopped
  #   shm_size: "2gb"

  # ── FastAPI backend ───────────────────────────────────
  backend:
    build: .
    container_name: pdd-backend
    ports:
      - "8066:8000"
    environment:
      - CHROME_SHOP1_CDP=http://chrome-shop1:9223
      - CHROME_SHOP1_VNC=http://chrome-shop1:6080
      # - CHROME_SHOP2_CDP=http://chrome-shop2:9222
      # - CHROME_SHOP2_VNC=http://chrome-shop2:6081
    depends_on:
      chrome-shop1:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chrome-shop1-data:
  # chrome-shop2-data:
